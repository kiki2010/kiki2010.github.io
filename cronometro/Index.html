<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cronometro de Kiki</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="marco">
        <div class="tiempo" id="tiempo">
            00:00:00.000
        </div>
        <div class="botones">
            <div class="btn" onclick="iniciar()">
                <img src="botones/play.png" alt="">
            </div>
            <div class="btn" onclick="terminar()">
                <img src="botones/stop.png" alt="">
            </div>
            <div class="btn" onclick="reiniciar()">
                <img src="botones/redo.png" alt="">
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
